<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KK Pay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --card: #1c1c1c;
    --accent: #f5c842;
    --accent2: #ff6b35;
    --text: #f0ede8;
    --muted: #888;
    --border: #2a2a2a;
    --success: #4caf82;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 2rem;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(245,200,66,0.4);
  }

  .logo span { color: var(--accent2); }

  .cart-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 10px 22px;
    font-family: 'Bebas Neue', cursive;
    font-size: 1.1rem;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    position: relative;
  }
  .cart-btn:hover { background: #ffd95e; transform: translateY(-1px); }
  .cart-count {
    background: var(--accent2);
    color: #fff;
    border-radius: 50%;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
  }

  /* Hero */
  .hero {
    padding: 60px 32px 40px;
    text-align: center;
    background: linear-gradient(180deg, #1a1400 0%, var(--bg) 100%);
  }
  .hero h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(2.5rem, 6vw, 5rem);
    letter-spacing: 8px;
    line-height: 1;
    color: var(--text);
  }
  .hero h1 em {
    color: var(--accent);
    font-style: normal;
  }
  .hero p {
    color: var(--muted);
    margin-top: 12px;
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Products */
  .products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 2px;
    padding: 0 2px 2px;
    max-width: 1100px;
    margin: 0 auto 60px;
  }

  .product-card {
    background: var(--card);
    padding: 36px 28px;
    cursor: pointer;
    transition: all 0.25s;
    border: 2px solid transparent;
    position: relative;
    overflow: hidden;
  }
  .product-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 0;
  }
  .product-card:hover::before { opacity: 0.04; }
  .product-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .product-card.selected { border-color: var(--accent); }
  .product-card > * { position: relative; z-index: 1; }

  .product-swatch {
    width: 80px; height: 80px;
    border-radius: 50%;
    margin: 0 auto 20px;
    border: 3px solid var(--border);
    position: relative;
    overflow: hidden;
    transition: transform 0.25s;
  }
  .product-card:hover .product-swatch { transform: scale(1.05); }

  .swatch-white { background: #f5f5f5; border-color: #ccc; }
  .swatch-black { background: #111; border-color: #444; }
  .swatch-blue  { background: linear-gradient(135deg, #1a3a6b, #2d6be4); border-color: #3a5fad; }

  .product-name {
    font-size: 1.1rem;
    font-weight: 500;
    text-align: center;
    margin-bottom: 6px;
  }
  .product-price {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.8rem;
    letter-spacing: 2px;
    color: var(--accent);
    text-align: center;
  }
  .product-price span {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0;
  }

  .add-btn {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .add-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

  /* Cart Sidebar */
  .cart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(4px);
  }
  .cart-overlay.open { opacity: 1; pointer-events: all; }

  .cart-panel {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: min(420px, 100vw);
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 201;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
  }
  .cart-panel.open { transform: translateX(0); }

  .cart-header {
    padding: 24px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cart-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.6rem;
    letter-spacing: 3px;
  }
  .close-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.4rem;
    cursor: pointer;
    padding: 4px;
    transition: color 0.2s;
  }
  .close-btn:hover { color: var(--text); }

  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 16px 28px;
  }
  .cart-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity:0; transform: translateX(10px); } to { opacity:1; transform: translateX(0); } }

  .item-dot {
    width: 36px; height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid var(--border);
  }
  .item-info { flex: 1; }
  .item-name { font-size: 0.9rem; font-weight: 500; }
  .item-price { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

  .qty-control {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qty-btn {
    width: 28px; height: 28px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 1rem;
    cursor: pointer;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .qty-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
  .qty-num { font-size: 0.9rem; min-width: 20px; text-align: center; }

  .cart-empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 0;
    font-size: 0.9rem;
    letter-spacing: 1px;
  }

  .cart-footer {
    padding: 20px 28px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .cart-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .total-label { font-size: 0.9rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .total-amount {
    font-family: 'Bebas Neue', cursive;
    font-size: 2rem;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .pay-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Bebas Neue', cursive;
    font-size: 1.3rem;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .pay-btn:hover { background: #ffd95e; transform: translateY(-1px); }
  .pay-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

  /* QR Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(8px);
    padding: 20px;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px 36px;
    width: min(440px, 100%);
    text-align: center;
    transform: scale(0.9);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
  }
  .modal-overlay.open .modal { transform: scale(1); }

  .modal-logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.4rem;
    letter-spacing: 4px;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .modal-title {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .qr-amount {
    font-family: 'Bebas Neue', cursive;
    font-size: 3.5rem;
    letter-spacing: 4px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }
  .qr-amount-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 28px; letter-spacing: 1px; }

  .qr-wrapper {
    background: #fff;
    padding: 16px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    box-shadow: 0 0 40px rgba(245,200,66,0.15);
  }
  #qrcode canvas, #qrcode img { display: block; }

  .order-summary {
    background: var(--surface);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 20px;
    text-align: left;
  }
  .order-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    color: var(--muted);
    padding: 3px 0;
  }
  .order-row.total {
    border-top: 1px solid var(--border);
    margin-top: 6px;
    padding-top: 8px;
    color: var(--text);
    font-weight: 500;
  }

  .qr-hint {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .confirm-btn {
    width: 100%;
    padding: 14px;
    background: var(--success);
    color: #fff;
    border: none;
    font-family: 'Bebas Neue', cursive;
    font-size: 1.2rem;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
    margin-bottom: 10px;
  }
  .confirm-btn:hover { filter: brightness(1.1); }

  .cancel-btn {
    width: 100%;
    padding: 10px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .cancel-btn:hover { color: var(--text); border-color: var(--text); }

  /* Success */
  .success-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 400;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
    backdrop-filter: blur(12px);
  }
  .success-overlay.open { opacity: 1; pointer-events: all; }

  .success-box {
    text-align: center;
    transform: scale(0.8);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .success-overlay.open .success-box { transform: scale(1); }

  .check-circle {
    width: 100px; height: 100px;
    background: var(--success);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    font-size: 3rem;
    animation: pop 0.5s ease forwards;
  }
  @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.1)} 100%{transform:scale(1)} }

  .success-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 2.5rem;
    letter-spacing: 4px;
    color: var(--success);
    margin-bottom: 8px;
  }
  .success-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 30px; }

  .new-order-btn {
    padding: 14px 40px;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Bebas Neue', cursive;
    font-size: 1.2rem;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .new-order-btn:hover { background: #ffd95e; }

  .order-id {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Responsive */
  @media (max-width: 600px) {
    header { padding: 16px 20px; }
    .hero { padding: 40px 20px 30px; }
    .products { padding: 0 12px 40px; }
    .qr-amount { font-size: 2.5rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">KK<span>PAY</span></div>
  <button class="cart-btn" onclick="openCart()">
    🛒 購物車
    <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<div class="hero">
  <h1>精選<em>衣物</em>系列</h1>
  <p>選擇商品 · QR Code 快速結帳</p>
</div>

<div class="products">
  <div class="product-card" onclick="addToCart('white')">
    <div class="product-swatch swatch-white"></div>
    <div class="product-name">白色衣服</div>
    <div class="product-price">NT$100 <span>/ 件</span></div>
    <button class="add-btn">+ 加入購物車</button>
  </div>
  <div class="product-card" onclick="addToCart('black')">
    <div class="product-swatch swatch-black"></div>
    <div class="product-name">黑色衣服</div>
    <div class="product-price">NT$100 <span>/ 件</span></div>
    <button class="add-btn">+ 加入購物車</button>
  </div>
  <div class="product-card" onclick="addToCart('blue')">
    <div class="product-swatch swatch-blue"></div>
    <div class="product-name">藍色衣服</div>
    <div class="product-price">NT$100 <span>/ 件</span></div>
    <button class="add-btn">+ 加入購物車</button>
  </div>
</div>

<!-- Cart Sidebar -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <div class="cart-title">購物車</div>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty" id="cartEmpty">購物車是空的</div>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span class="total-label">總計</span>
      <span class="total-amount" id="totalAmount">NT$0</span>
    </div>
    <button class="pay-btn" id="payBtn" onclick="openQR()" disabled>掃碼結帳</button>
  </div>
</div>

<!-- QR Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-logo">KK PAY</div>
    <div class="modal-title">掃描 QR Code 完成付款</div>

    <div class="qr-amount" id="qrAmount">NT$0</div>
    <div class="qr-amount-label">應付金額</div>

    <div class="qr-wrapper">
      <div id="qrcode"></div>
    </div>

    <div class="order-summary" id="orderSummary"></div>

    <div class="qr-hint">
      請使用 LINE Pay、街口支付、Apple Pay 等<br>
      掃描上方 QR Code 完成付款
    </div>

    <button class="confirm-btn" onclick="confirmPayment()">✓ 確認付款完成</button>
    <button class="cancel-btn" onclick="closeQR()">取消</button>
  </div>
</div>

<!-- Success -->
<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <div class="check-circle">✓</div>
    <div class="success-title">付款成功！</div>
    <div class="order-id" id="orderId"></div>
    <div class="success-sub">感謝您的購買，祝您購物愉快 🎉</div>
    <button class="new-order-btn" onclick="resetAll()">繼續購物</button>
  </div>
</div>

<script>
const PRODUCTS = {
  white: { name: '白色衣服', price: 100, color: '#f5f5f5', border: '#ccc' },
  black: { name: '黑色衣服', price: 100, color: '#111', border: '#444' },
  blue:  { name: '藍色衣服', price: 100, color: '#2d6be4', border: '#3a5fad' }
};

let cart = {};

function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  renderCart();
  // Brief flash on card
  event.currentTarget.style.borderColor = 'var(--success)';
  setTimeout(() => event.currentTarget.style.borderColor = '', 400);
}

function changeQty(id, delta) {
  cart[id] = (cart[id] || 0) + delta;
  if (cart[id] <= 0) delete cart[id];
  renderCart();
}

function renderCart() {
  const items = document.getElementById('cartItems');
  const empty = document.getElementById('cartEmpty');
  const count = Object.values(cart).reduce((a,b)=>a+b,0);
  const total = Object.entries(cart).reduce((s,[id,q])=>s+PRODUCTS[id].price*q,0);

  document.getElementById('cartCount').textContent = count;
  document.getElementById('totalAmount').textContent = `NT$${total}`;
  document.getElementById('payBtn').disabled = count === 0;

  // Render items
  items.innerHTML = '';
  if (count === 0) {
    items.innerHTML = '<div class="cart-empty">購物車是空的</div>';
    return;
  }
  Object.entries(cart).forEach(([id, qty]) => {
    const p = PRODUCTS[id];
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `
      <div class="item-dot" style="background:${p.color};border-color:${p.border}"></div>
      <div class="item-info">
        <div class="item-name">${p.name}</div>
        <div class="item-price">NT$${p.price} / 件</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('${id}',-1)">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" onclick="changeQty('${id}',1)">＋</button>
      </div>
    `;
    items.appendChild(div);
  });
}

function openCart() {
  document.getElementById('cartOverlay').classList.add('open');
  document.getElementById('cartPanel').classList.add('open');
}
function closeCart() {
  document.getElementById('cartOverlay').classList.remove('open');
  document.getElementById('cartPanel').classList.remove('open');
}

function openQR() {
  const total = Object.entries(cart).reduce((s,[id,q])=>s+PRODUCTS[id].price*q,0);
  if (total === 0) return;

  document.getElementById('qrAmount').textContent = `NT$${total}`;

  // Order summary
  let summaryHTML = '';
  Object.entries(cart).forEach(([id,qty]) => {
    const p = PRODUCTS[id];
    summaryHTML += `<div class="order-row"><span>${p.name} × ${qty}</span><span>NT$${p.price*qty}</span></div>`;
  });
  summaryHTML += `<div class="order-row total"><span>合計</span><span>NT$${total}</span></div>`;
  document.getElementById('orderSummary').innerHTML = summaryHTML;

  // Generate QR code
  document.getElementById('qrcode').innerHTML = '';
  // QR encodes payment info string
  const orderId = 'KK' + Date.now();
  const qrData = `KKPAY|ORDER:${orderId}|AMOUNT:${total}|TIME:${new Date().toISOString()}`;
  new QRCode(document.getElementById('qrcode'), {
    text: qrData,
    width: 200,
    height: 200,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });

  document.getElementById('modalOverlay').classList.add('open');
  closeCart();
}

function closeQR() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function confirmPayment() {
  const orderId = 'KK' + Date.now();
  document.getElementById('orderId').textContent = `訂單編號：${orderId}`;
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('successOverlay').classList.add('open');
}

function resetAll() {
  cart = {};
  renderCart();
  document.getElementById('successOverlay').classList.remove('open');
}
</script>
</body>
</html>
